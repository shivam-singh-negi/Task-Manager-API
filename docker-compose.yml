services:
  api:
    build: .
    container_name: task-manager-api
    # Allow overriding the host port with HOST_PORT; default to 5001 to avoid conflicts
    ports:
      - "${HOST_PORT:-5001}:5000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/instance/task_manager.db}
    restart: always
